name: Deploy Certify Service

on:
  # pull_request:
  #   types: [closed]
  push:
    branches:
      - develop
      - test
      - main

jobs:
  deploy:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.base_ref == 'main' && 'prod' || (github.base_ref == 'test' && 'qa' || 'develop') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: 'k8s-inji-dev'
          location: 'us-central1-a'

      - name: Restart Kubernetes deployment
        run: |
          kubectl rollout restart deployment/${{ steps.env.outputs.deployment_name }} -n ${{ steps.env.outputs.deployment_namespace }}
          kubectl rollout status deployment/${{ steps.env.outputs.deployment_name }} -n ${{ steps.env.outputs.deployment_namespace }} --timeout=5m