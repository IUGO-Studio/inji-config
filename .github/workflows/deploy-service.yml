name: Deploy Certify Service

on:
  # pull_request:
  #   types: [closed]
  push:
    branches:
      - develop
      - test
      - main

jobs:
  deploy:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.base_ref == 'main' && 'prod' || (github.base_ref == 'test' && 'qa' || 'develop') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: 'k8s-inji-dev'
          location: 'us-central1-a'

      - name: Restart Kubernetes deployment
        run: |
          kubectl rollout restart deployment/config-server -n config-server
          kubectl rollout status deployment/config-server -n config-server --timeout=5m